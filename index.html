<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>앱 다운로드 안내</title>
</head>
<body>
  <p>잠시만 기다려 주세요...</p>

  <script>
    const ua = navigator.userAgent || navigator.vendor || window.opera;

    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);

    const androidUrl = "https://play.google.com/store/apps/details?id=com.kraftsolution.kraftapp";
    const iosUrl = "https://apps.apple.com/kr/app/kraftsolution/id6757570954";

    if (isAndroid) {
      window.location.replace(androidUrl);
    } else if (isIOS) {
      window.location.replace(iosUrl);
    } else {
      document.body.innerHTML = `
        <h1>모바일 기기에서 접속해 주세요.</h1>
        <p><a href="${androidUrl}">Android 다운로드</a></p>
        <p><a href="${iosUrl}">iPhone 다운로드</a></p>
      `;
    }
  </script>
</body>
</html>
